<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login - FuelFinder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="example.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');

        /* css test - LUMINA LUXURY PALETTE */
        :root {
            /* BACKGROUND */
            --bg-primary: #F9F9F9; /* soft white */
            --bg-secondary: #EFEDE8; /* light beige tone */
            --bg-card: #FFFFFF; /* clean white cards */
            --bg-hover: #E6E1D9; /* subtle beige hover */
            --bg-input: #F3F1EC; /* input background */

            /* TEXT */
            --text-primary: #333333; /* charcoal */
            --text-secondary: #666666; /* softer dark */
            --text-muted: #999999;

            /* ACCENTS */
            --accent-orange: #C8A97E; /* warm beige accent */
            --accent-cyan: #BFB8AA; /* muted neutral */
            --accent-blue: #A89F91;
            --accent-green: #9C9485;
            --accent-purple: #BFA58A;
            --accent-red: #BFA58A;

            /* BORDER */
            --border: #DDD6C8;
            --border-light: #EAE5DC;

            /* SHADOW */
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.10);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);

            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            display: grid;
            place-items: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200, 169, 126, 0.1) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        body::before {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 300px;
            height: 300px;
            bottom: -50px;
            right: -50px;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

       .login-wrapper {
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.8s ease;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

       .logo-section {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeIn 1s ease 0.2s backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

       .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 24px;
            font-size: 2.8rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow-md);
            animation: iconPulse 3s ease-in-out infinite;
            position: relative;
        }

       .logo-icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 28px;
            background: linear-gradient(135deg, var(--accent-orange), transparent);
            opacity: 0.3;
            z-index: -1;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.05) rotate(5deg); }
        }

       .logo-section h1 {
            font-size: clamp(2rem, 6vw, 2.75rem);
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            position: relative;
            display: inline-block;
        }

       .logo-section h1::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--accent-orange);
            border-radius: 2px;
        }

       .logo-section p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-top: 1rem;
        }

       .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

       .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-orange), var(--accent-cyan), var(--accent-orange));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

       .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--bg-input);
            padding: 0.5rem;
            border-radius: 16px;
        }

       .tab-btn {
            flex: 1;
            padding: 14px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            letter-spacing: 0.3px;
        }

       .tab-btn:hover {
            color: var(--text-primary);
            transform: translateY(-1px);
        }

       .tab-btn.active {
            background: var(--text-primary);
            color: #FFFFFF;
            box-shadow: var(--shadow-sm);
        }

       .form-content {
            display: none;
            animation: fadeSlide 0.4s ease;
        }

       .form-content.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

       .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

       .input-field {
            width: 100%;
            padding: 16px 20px 16px 52px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            font-weight: 500;
        }

       .input-field:focus {
            border-color: var(--accent-orange);
            box-shadow: 0 0 0 4px rgba(200, 169, 126, 0.15);
            background: var(--bg-card);
            transform: translateY(-2px);
        }

       .input-field::placeholder {
            color: var(--text-muted);
        }

       .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.3rem;
            opacity: 0.5;
            transition: var(--transition);
        }

       .input-field:focus ~.input-icon {
            opacity: 0.8;
            transform: translateY(-50%) scale(1.1);
        }

       .error-msg {
            background: rgba(191, 165, 138, 0.15);
            border: 1px solid rgba(191, 165, 138, 0.4);
            color: var(--accent-orange);
            padding: 0.875rem 1rem;
            border-radius: 12px;
            text-align: center;
            display: none;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

       .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--text-primary);
            border: none;
            border-radius: 16px;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

       .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

       .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

       .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
            background: #1a1a1a;
        }

       .submit-btn:active {
            transform: translateY(-1px);
        }

       .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            body { padding: 1rem; }
           .login-card { padding: 2rem 1.5rem; border-radius: 24px; }
           .logo-icon { width: 70px; height: 70px; font-size: 2.5rem; }
           .logo-section h1 { font-size: 2rem; }
           .input-field { padding: 14px 18px 14px 48px; font-size: 14px; }
           .submit-btn { padding: 14px; font-size: 15px; }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="logo-section">
            <div class="logo-icon">⛽</div>
            <h1>FuelFinder</h1>
            <p>Find nearby fuel stations instantly</p>
        </div>

        <div class="login-card">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('signin')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div class="form-content active" id="signinForm">
                <form id="loginForm">
                    <div class="input-group">
                        <span class="input-icon">📧</span>
                        <input type="email" id="loginEmail" class="input-field" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" class="input-field" placeholder="Password" required>
                    </div>
                    <div class="error-msg" id="loginErrorMsg"></div>
                    <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
                </form>
            </div>

            <div class="form-content" id="signupForm">
                <form id="signupFormElement">
                    <div class="input-group">
                        <span class="input-icon">👤</span>
                        <input type="text" id="signupName" class="input-field" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <span class="input-icon">📧</span>
                        <input type="email" id="signupEmail" class="input-field" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="signupPassword" class="input-field" placeholder="Password" required>
                    </div>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm Password" required>
                    </div>
                    <div class="error-msg" id="signupErrorMsg"></div>
                    <button type="submit" class="submit-btn" id="signupBtn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>

    <script>
        const SUPABASE_URL = "https://zrgvxxbdevcwkpohckwj.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpyZ3Z4eGJkZXZjd2twb2hja3dqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NzAwNzgsImV4cCI6MjA5MjI0NjA3OH0.-js43IF_QQk7793-AqP6aSV2VbyWiZWj9SH5tprYjJs";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(form => form.classList.remove('active'));
            if (tab === 'signin') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('signinForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
        }

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            const errorEl = document.getElementById("loginErrorMsg");
            const btn = document.getElementById("loginBtn");
            errorEl.style.display = "none";
            btn.disabled = true;
            btn.textContent = "Signing in...";
            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                if (error) throw error;
                localStorage.setItem("loggedIn", "true");
                localStorage.setItem("userEmail", email);
                btn.textContent = "✓ Success!";
                setTimeout(() => window.location.href = "header.html", 500);
            } catch (err) {
                showError("loginErrorMsg", err.message);
                btn.disabled = false;
                btn.textContent = "Sign In";
            }
        });

        document.getElementById("signupFormElement").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("signupName").value.trim();
            const email = document.getElementById("signupEmail").value.trim();
            const password = document.getElementById("signupPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const btn = document.getElementById("signupBtn");
            if (password!== confirmPassword) {
                showError("signupErrorMsg", "Passwords do not match");
                return;
            }
            if (password.length < 6) {
                showError("signupErrorMsg", "Password must be at least 6 characters");
                return;
            }
            btn.disabled = true;
            btn.textContent = "Creating account...";
            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { full_name: name } }
                });
                if (error) throw error;
                btn.textContent = "✓ Account created!";
                showError("signupErrorMsg", "Account created! You can now Sign In.");
                setTimeout(() => {
                    switchTab('signin');
                    document.getElementById("loginEmail").value = email;
                }, 2000);
            } catch (err) {
                showError("signupErrorMsg", err.message);
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        });

        function showError(elementId, msg) {
            const errorEl = document.getElementById(elementId);
            errorEl.textContent = msg;
            errorEl.style.display = "block";
        }
